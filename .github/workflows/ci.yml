name: CI
on:
  push:
    branches:
      - main
      - next
  pull_request:

jobs:
  Test:
    if: "!contains(github.event.head_commit.message, 'SKIP CI')"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - lts/-1
          - lts/*
          - latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Verify subpath exports (build + dist-grep + self-ref probes)
        run: npm run build:verify

  visual:
    name: 'Visual Tests'
    if: "!contains(github.event.head_commit.message, 'SKIP CI')"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v6

      - name: Run visual tests (node ${{ matrix.node-version }})
        run: make ci

      - name: Upload snapshot diffs
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: snapshots-diffs
          path: __tests__/browser/__image_snapshots__/__diff_output__
          overwrite: true

      - name: Update regression test snapshots
        if: ${{ failure() }}
        run: make updateSnapshot

      - name: Upload snapshots
        uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: image-snapshots
          path: __tests__/browser/__image_snapshots__/
          overwrite: true
